services:
  - type: web
    name: contabilidad-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers ${WEB_CONCURRENCY:-2} --timeout 120
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_DEBUG
        value: "0"
      - key: APP_HOST
        value: 0.0.0.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: contabilidad-db
          property: connectionString
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Administrador

databases:
  - name: contabilidad-db
    databaseName: contabilidad
    user: contabilidad_user
