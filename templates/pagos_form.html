{% extends 'base.html' %}
{% block title %}Registrar pago{% endblock %}
{% block content %}
<h1 class="h3 mb-3">{{ 'Editar pago' if pago else 'Registrar pago o aporte' }}</h1>
<div class="card shadow-sm"><div class="card-body"><form method="post" class="row g-3">
  <div class="col-md-6"><label class="form-label">Alumno</label><select class="form-select" name="alumno_id" required><option value="">Selecciona</option>{% for alumno in alumnos %}<option value="{{ alumno['id'] }}" {% if pago and pago['alumno_id']==alumno['id'] %}selected{% endif %}>{{ alumno['nombre'] }}{% if alumno['curso'] %} ({{ alumno['curso'] }}){% endif %}</option>{% endfor %}</select></div>
  <div class="col-md-3"><label class="form-label">Fecha</label><input class="form-control" type="date" name="fecha" value="{{ pago['fecha'] if pago else now.strftime('%Y-%m-%d') }}" required></div>
  <div class="col-md-3"><label class="form-label">Mes</label><input class="form-control" name="mes" value="{{ pago['mes'] if pago else now.strftime('%Y-%m') }}" required></div>
  {% if not pago %}
  <div class="col-md-4"><label class="form-label">Tipo</label><select class="form-select" name="tipo_pago" id="tipoPago"><option value="cuota_mensual">Abono a cuota mensual</option><option value="actividad_alumno">Aporte a actividad</option></select></div>
  <div class="col-md-4"><label class="form-label">Monto</label><input class="form-control" name="monto" required></div>
  <div class="col-md-4" id="actividadWrap"><label class="form-label">Actividad</label><select class="form-select" name="actividad_id"><option value="">Sin actividad</option>{% for a in actividades %}<option value="{{ a['id'] }}">{{ a['nombre'] }} ({{ a['fecha'] }})</option>{% endfor %}</select></div>
  {% else %}
  <div class="col-md-6"><label class="form-label">Monto</label><input class="form-control" name="monto" value="{{ pago['monto'] }}" required></div>
  <div class="col-md-6"><label class="form-label">Tipo</label><input class="form-control" value="Cuota mensual" disabled></div>
  {% endif %}
  <div class="col-12"><label class="form-label">Observación</label><textarea class="form-control" name="observacion" rows="3">{{ pago['observacion'] if pago else '' }}</textarea></div>
  <div class="col-12 d-flex gap-2"><button class="btn btn-primary">Guardar</button><a class="btn btn-outline-secondary" href="{{ url_for('pagos_list') }}">Cancelar</a></div>
</form></div></div>
{% endblock %}
{% block scripts %}{% if not pago %}<script>function toggleActividad(){const isAporte=document.getElementById('tipoPago').value==='actividad_alumno';document.getElementById('actividadWrap').style.display=isAporte?'block':'none';}document.getElementById('tipoPago').addEventListener('change',toggleActividad);toggleActividad();</script>{% endif %}{% endblock %}
