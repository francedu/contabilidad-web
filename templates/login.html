{% extends 'base.html' %}
{% block title %}Iniciar sesión{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="card shadow login-card border-0">
    <div class="card-body p-4 p-md-5">
      <div class="page-eyebrow">Acceso al sistema</div>
      <h1 class="h3 mb-1">Iniciar sesión</h1>
      <p class="text-muted mb-4">{{ SCHOOL_NAME }} · {{ SCHOOL_LOCATION }}</p>
      <form method="post" class="row g-3">
        <div class="col-12"><label class="form-label">Usuario</label><input class="form-control form-control-lg" name="username" required autofocus placeholder="Ingresa tu usuario"></div>
        <div class="col-12">
          <label class="form-label">Contraseña</label>
          <div class="input-group input-group-lg">
            <input class="form-control" id="passwordField" type="password" name="password" required placeholder="Ingresa tu contraseña">
            <button class="btn btn-outline-secondary" type="button" data-toggle-password="#passwordField">Mostrar</button>
          </div>
        </div>
        <div class="col-12 d-grid"><button class="btn btn-primary btn-lg">Entrar</button></div>
      </form>
      <div class="login-help small text-muted mt-4">Acceso inicial: <strong>admin</strong> / <strong>admin123</strong></div>
    </div>
  </div>
</div>
{% endblock %}
