{% extends 'base.html' %}
{% block title %}Usuario{% endblock %}
{% block content %}
<h1 class="h3 mb-3">{{ 'Editar usuario' if usuario else 'Nuevo usuario' }}</h1>
<div class="card shadow-sm"><div class="card-body"><form method="post" class="row g-3">
  <div class="col-md-6"><label class="form-label">Nombre</label><input class="form-control" name="nombre" value="{{ usuario['nombre'] if usuario else '' }}" required></div>
  <div class="col-md-6"><label class="form-label">Usuario</label><input class="form-control" name="username" value="{{ usuario['username'] if usuario else '' }}" required></div>
  <div class="col-md-6"><label class="form-label">Rol</label><select class="form-select" name="role">{% for role in roles %}<option value="{{ role }}" {% if usuario and usuario['role']==role %}selected{% endif %}>{{ role }}</option>{% endfor %}</select></div>
  <div class="col-md-6">
    <label class="form-label">Curso asignado</label>
    <select class="form-select" name="curso">
      <option value="">Sin curso / todos los cursos</option>
      {% set selected_course = usuario['curso'] if usuario else '' %}
      {% for curso in predefined_courses %}
        <option value="{{ curso }}" {% if selected_course == curso %}selected{% endif %}>{{ curso }}</option>
      {% endfor %}
      {% if selected_course and selected_course not in predefined_courses %}
        <option value="{{ selected_course }}" selected>{{ selected_course }}</option>
      {% endif %}
    </select>
    <div class="form-text">Déjalo vacío solo para administradores.</div>
  </div>
  <div class="col-md-6"><label class="form-label">{{ 'Nueva contraseña (opcional)' if usuario else 'Contraseña' }}</label><input class="form-control" type="password" name="password" {% if not usuario %}required{% endif %}></div>
  <div class="col-12 form-check ms-2"><input class="form-check-input" type="checkbox" name="activo" {% if not usuario or usuario['activo'] %}checked{% endif %}><label class="form-check-label">Usuario activo</label></div>
  <div class="col-12 d-flex gap-2"><button class="btn btn-primary">Guardar</button><a class="btn btn-outline-secondary" href="{{ url_for('usuarios_list') }}">Cancelar</a></div>
</form></div></div>
{% endblock %}
